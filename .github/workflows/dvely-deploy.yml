name: Dvely Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "path=/" >> $GITHUB_OUTPUT
            echo "base=" >> $GITHUB_OUTPUT
          else
            echo "path=/${REPO}/" >> $GITHUB_OUTPUT
            echo "base=/${REPO}" >> $GITHUB_OUTPUT
          fi

      - name: Configure CRA homepage
        run: |
          BASE="${{ steps.base.outputs.path }}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.homepage='$BASE';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          echo "package.json homepage 설정 완료: $BASE"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
          PUBLIC_URL: ${{ steps.base.outputs.path }}

      - name: Copy index.html to 404.html
        run: |
          [ -f ./build/index.html ] && cp ./build/index.html ./build/404.html || true

      - name: Preserve custom domain
        run: |
          mkdir -p ./build
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            if git fetch origin gh-pages --depth=1; then
              if git show FETCH_HEAD:CNAME > /tmp/dvely-cname 2>/dev/null; then
                cp /tmp/dvely-cname ./build/CNAME
                echo "기존 CNAME 파일 보존 완료"
              else
                echo "기존 CNAME 파일 없음"
              fi
            else
              echo "gh-pages 브랜치 fetch 실패"
            fi
          else
            echo "gh-pages 브랜치 없음"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
